services:
  app:
    image: php:8.4-cli
    volumes:
      - .:/app
      - ../../packages:/packages
    working_dir: /app
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8002:8000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: taskmanager
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  composer:
    image: composer:latest
    volumes:
      - .:/app
      - ../../packages:/packages
    working_dir: /app

volumes:
  db_data:
