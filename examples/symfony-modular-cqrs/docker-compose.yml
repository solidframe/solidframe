services:
  app:
    image: php:8.4-cli
    volumes:
      - .:/app
    working_dir: /app
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "8004:8000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ecommerce
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql

  test:
    image: php:8.4-cli
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: php vendor/bin/phpunit

  composer:
    image: composer:latest
    volumes:
      - .:/app
    working_dir: /app

volumes:
  db_data:
