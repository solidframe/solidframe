services:
  app:
    image: php:8.4-cli
    volumes:
      - .:/app
      - ../../packages:/packages
    working_dir: /app
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "8003:8000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: taskmanager
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  test:
    image: php:8.4-cli
    volumes:
      - .:/app
      - ../../packages:/packages
    working_dir: /app
    entrypoint: php vendor/bin/phpunit

  composer:
    image: composer:latest
    volumes:
      - .:/app
      - ../../packages:/packages
    working_dir: /app

volumes:
  db_data:
